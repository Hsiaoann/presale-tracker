name: probe-permit

on:
  workflow_dispatch:

jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - name: probe ntpc variants
        run: |
          BASE="https://building-apply.publicwork.ntpc.gov.tw/opendata/OpenDataSearchUrl.do"
          try () {
            echo "=============================="
            echo "TEST: $1"
            curl -s -L --max-time 30 -G "$BASE" \
              --data-urlencode "d=OPENDATA" \
              --data-urlencode "c=BUILDLIC" \
              --data-urlencode "Start=1" \
              "${@:2}" -o r.txt -w "HTTP %{http_code}, size %{size_download}\n"
            head -c 900 r.txt
            echo ""
          }

          try "只給執照類別" --data-urlencode "執照類別=建造執照"
          try "類別+發照日期(115年06月)" --data-urlencode "執照類別=建造執照" --data-urlencode "發照日期=115年06月"
          try "類別+發照日期(115年05月)" --data-urlencode "執照類別=建造執照" --data-urlencode "發照日期=115年05月"
          try "類別+行政區(土城區)" --data-urlencode "執照類別=建造執照" --data-urlencode "地號.行政區=土城區"
          try "類別+日期+行政區(土城區)" --data-urlencode "執照類別=建造執照" --data-urlencode "發照日期=115年06月" --data-urlencode "地號.行政區=土城區"
          try "完全不給條件" 
          try "使用執照+115年06月" --data-urlencode "執照類別=使用執照" --data-urlencode "發照日期=115年06月"
