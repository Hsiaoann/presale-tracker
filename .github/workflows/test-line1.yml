name: test-line-notify

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: send test message
        env:
          LINE_CHANNEL_TOKEN: ${{ secrets.LINE_CHANNEL_TOKEN }}
          LINE_USER_ID: ${{ secrets.LINE_USER_ID }}
        run: |
          code=$(curl -s -o resp.txt -w "%{http_code}" -X POST https://api.line.me/v2/bot/message/push \
            -H "Authorization: Bearer $LINE_CHANNEL_TOKEN" \
            -H "Content-Type: application/json" \
            -d '{"to":"'"$LINE_USER_ID"'","messages":[{"type":"text","text":"測試訊息：預售案追蹤器設定成功"}]}')
          echo "HTTP status: $code"
          echo "--- response ---"
          cat resp.txt
          if [ "$code" != "200" ]; then
            echo "推播失敗"
            exit 1
          fi
          echo "推播成功"
