name: daily-presale-tracker

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  track:
    runs-on: ubuntu-latest
    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: setup python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: install deps
        run: pip install -r requirements.txt

      - name: debug fetch
        run: |
          curl -s -L -A "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36" "https://www.rakuya.com.tw/nc/result?tab=presale_house" -o page.html -w "HTTP %{http_code}, size %{size_download} bytes\n"
          echo "--- nc_item 出現次數 ---"
          grep -o "nc_item" page.html | wc -l
          echo "--- 頁面開頭1500字 ---"
          head -c 1500 page.html

      - name: run tracker
        env:
          NOTIFY_METHOD: ${{ vars.NOTIFY_METHOD }}
          LINE_CHANNEL_TOKEN: ${{ secrets.LINE_CHANNEL_TOKEN }}
          LINE_USER_ID: ${{ secrets.LINE_USER_ID }}
          LINE_NOTIFY_TOKEN: ${{ secrets.LINE_NOTIFY_TOKEN }}
        run: python main.py

      - name: commit state
        run: |
          if [ -n "$(git status --porcelain seen_listings.json)" ]; then
            git config user.name "presale-bot"
            git config user.email "bot@users.noreply.github.com"
            git add seen_listings.json
            git commit -m "update seen listings"
            git push
          else
            echo "no changes"
          fi
